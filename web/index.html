<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>onetrickle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">onetrickle</div>
      <span class="section-label">Navigate</span>
      <nav id="nav">
        <a href="#/" data-route="">Dashboard</a>
        <a href="#/grid" data-route="grid">Quick View</a>
        <a href="#/workflow" data-route="workflow">Workflow</a>
        <a href="#/metadata" data-route="metadata">Metadata</a>
        <a href="#/rates" data-route="rates">Rates</a>
        <a href="#/import" data-route="import">Import</a>
        <a href="#/formulas" data-route="formulas">Formulas</a>
      </nav>
    </aside>
    <div class="main">
      <header class="topbar">
        <span class="section-label">POV</span>
        <label>Cube <select id="pov-cube"></select></label>
        <label>Scenario <select id="pov-scenario"></select></label>
        <label>Month <select id="pov-time"></select></label>
      </header>
      <main id="view" class="view"></main>
    </div>
  </div>
  <div id="toasts" class="toasts" aria-live="polite"></div>
  <script src="app.js" defer></script>
</body>
</html>
