# onetrickle reverse proxy for nginx (alternative to Caddy).
# Install to /etc/nginx/sites-available/onetrickle and symlink into
# sites-enabled/, then add TLS with certbot:
#
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo certbot --nginx -d cpm.example.com
#
# certbot rewrites this block to add the `listen 443 ssl` / certificate lines
# and an HTTP->HTTPS redirect. Login is handled by the app (HTTP Basic Auth),
# so no auth_basic directive is needed here.

server {
	listen 80;
	listen [::]:80;
	server_name cpm.example.com;

	# CSV imports can be up to 20 MB (the app's cap); allow a little headroom.
	client_max_body_size 25m;

	location / {
		proxy_pass http://127.0.0.1:8080;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}
